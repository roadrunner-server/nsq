version: '3'

rpc:
  listen: tcp://127.0.0.1:7002

server:
  command: "php php_test_files/jobs/jobs_ok.php"
  relay: "pipes"
  relay_timeout: "20s"

nsq:
  addr: tcp://127.0.0.1:4150

logs:
  level: debug
  encoding: console
  mode: development

jobs:
  num_pollers: 10
  pipeline_size: 100000
  pool:
    num_workers: 10
    max_jobs: 0
    allocate_timeout: 60s
    destroy_timeout: 60s

  pipelines:
    test-1:
      driver: nsq
      config:
        topic: rr-init-1
        channel: default
        priority: 11
        prefetch: 10

    test-2:
      driver: nsq
      config:
        topic: rr-init-2
        channel: default
        priority: 11
        prefetch: 10

  # list of pipelines to be consumed by the server, keep empty if you want to start consuming manually
  consume: [ "test-1", "test-2" ]
