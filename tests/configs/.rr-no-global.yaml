version: '3'

rpc:
  listen: tcp://127.0.0.1:7008

server:
  command: "php php_test_files/jobs/jobs_ok.php"
  relay: "pipes"
  relay_timeout: "20s"

logs:
  level: error
  mode: development

jobs:
  num_pollers: 10
  pipeline_size: 100000
  pool:
    num_workers: 10
    max_jobs: 0
    allocate_timeout: 60s
    destroy_timeout: 60s

  # list of broker pipelines associated with endpoints
  pipelines:
    test-1:
      driver: nsq
      config:
        topic: rr-noglobal-1
        channel: default
        priority: 11
        prefetch: 10

  consume: [ "test-1" ]

endure:
  log_level: error
